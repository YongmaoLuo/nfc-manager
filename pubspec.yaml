name: app
description: A new Flutter project.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  nfc_manager: ^3.5.0
  package_info_plus: ^8.0.0
  provider: ^6.0.0
  sqflite: ^2.0.0
  url_launcher: ^6.0.0

dependency_overrides:
  sqflite:
    git:
      url: https://gitee.com/openharmony-sig/flutter_sqflite.git
      ref: master
      path: sqflite

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons:
flutter:
  uses-material-design: true

flutter_icons:
  android: true
  ios: true
  image_path_android: "assets/icon/android.png"
  image_path_ios: "assets/icon/ios.png"
  adaptive_icon_foreground: assets/icon/android_adaptive.png
  adaptive_icon_background: "#4d8cfe"
  remove_alpha_ios: true
